name: Build EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Windows executable and publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path -Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Determine version
        shell: powershell
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if (-not $env:INPUT_VERSION -or $env:INPUT_VERSION -eq '') {
            Write-Error 'The version input is required.'
            exit 1
          }
          $version = $env:INPUT_VERSION
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile main.py

      - name: Extract latest changelog entry
        id: extract_changelog
        shell: powershell
        run: |
          $lines = Get-Content CHANGELOG.md -ErrorAction Stop
          $section = @()
          $inSection = $false
          foreach ($line in $lines) {
            if ($line -match '^## \[') {
              if ($inSection) { break }
              $inSection = $true
              $section += $line
              continue
            }
            if ($inSection) { $section += $line }
          }
          if (-not $inSection -or $section.Count -eq 0) {
            Write-Error 'Failed to extract latest changelog entry from CHANGELOG.md.'
            exit 1
          }
          $body = ($section -join "`n").Trim()
          if (-not $body) {
            Write-Error 'Extracted changelog entry is empty.'
            exit 1
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_body<<'EOF'"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Create draft GitHub Release and upload executable
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: PDF_TSA_Signer-${{ env.VERSION }}
          body: ${{ steps.extract_changelog.outputs.release_body }}
          files: dist/main.exe
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
